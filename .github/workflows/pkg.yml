name: CI

on:
  push:
    branches:
      - main
      - staging
  pull_request:
  workflow_dispatch:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install build tooling
        shell: pwsh
        run: python -m pip install --upgrade pip maturin

      - name: Rust tests
        shell: pwsh
        run: cargo test

      - name: Rust lint
        shell: pwsh
        run: cargo clippy --all-targets --all-features -- -W clippy::all

  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dev dependencies
        shell: pwsh
        run: python -m pip install --upgrade pip; python -m pip install -e ".[dev]"

      - name: Python lint
        shell: pwsh
        run: python -m ruff check .

      - name: Python tests
        shell: pwsh
        run: python -m pytest

  dist-check:
    runs-on: ubuntu-latest
    needs:
      - rust
      - python
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install packaging tooling
        shell: pwsh
        run: python -m pip install --upgrade pip maturin twine

      - name: Build wheel and sdist
        shell: pwsh
        run: maturin build --release --out dist; maturin sdist --out dist

      - name: Check package metadata
        shell: pwsh
        run: python -m twine check dist/*

  wheels:
    name: ${{ matrix.os }} / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs:
      - rust
      - python
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            venv_python: .venv-smoke/bin/python
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            venv_python: .venv-smoke/Scripts/python.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
          sccache: true

      - name: Smoke test built wheel
        shell: pwsh
        run: |
          python -m venv .venv-smoke
          & ${{ matrix.venv_python }} -m pip install --upgrade pip
          $wheel = Get-ChildItem dist/*.whl | Select-Object -First 1
          if (-not $wheel) { throw "wheel was not produced" }
          & ${{ matrix.venv_python }} -m pip install $wheel.FullName
          & ${{ matrix.venv_python }} ./scripts/release_smoke.py

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  sdist:
    runs-on: ubuntu-latest
    needs:
      - rust
      - python
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
