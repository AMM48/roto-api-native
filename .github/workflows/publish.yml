name: Publish To PyPI

on:
  push:
    tags:
      - v*
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            venv_python: .venv-smoke/bin/python
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            venv_python: .venv-smoke/Scripts/python.exe
          - os: macos-13
            target: x86_64-apple-darwin
            venv_python: .venv-smoke/bin/python
          - os: macos-14
            target: aarch64-apple-darwin
            venv_python: .venv-smoke/bin/python

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
          sccache: true

      - name: Smoke test built wheel
        shell: pwsh
        run: |
          python -m venv .venv-smoke
          & ${{ matrix.venv_python }} -m pip install --upgrade pip
          $wheel = Get-ChildItem dist/*.whl | Select-Object -First 1
          if (-not $wheel) { throw "wheel was not produced" }
          & ${{ matrix.venv_python }} -m pip install $wheel.FullName
          & ${{ matrix.venv_python }} ./scripts/release_smoke.py

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  verify:
    needs:
      - build
      - sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install packaging tooling
        shell: pwsh
        run: python -m pip install --upgrade pip twine

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "*"
          merge-multiple: true

      - name: Check package metadata
        shell: pwsh
        run: python -m twine check dist/*

  publish:
    needs:
      - verify
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/roto-api-native
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "*"
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
